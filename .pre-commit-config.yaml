repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ["--verbose"]
  - repo: local
    hooks:
      - id: fuzzybee-health
        name: fuzzybee health check
        entry: bash bin/fuzzybee-execute health
        language: system
        pass_filenames: false
        always_run: true
      - id: fuzzybee-tests
        name: fuzzybee unit tests
        entry: uv run pytest tests/ -x --timeout=30
        language: system
        pass_filenames: false
        always_run: true
      - id: fuzzybee-bats
        name: fuzzybee bats tests
        entry: bats tests/test_health.bats
        language: system
        pass_filenames: false
        always_run: true
      - id: fuzzybee-self-audit
        name: fuzzybee self-audit
        entry: bash scripts/self-audit.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: fuzzybee-secret-check
        name: fuzzybee secret leak check
        entry: python3 -c "
import sys, re
patterns = [r'shpat_', r'shpss_', r'shpca_', r'atkn_', r'sk_live_', r'AKIA', r'sk-proj-']
for line in sys.stdin:
    for p in patterns:
        if re.search(p, line):
            print(f'SECRET PATTERN FOUND: {p}')
            sys.exit(1)
"
        language: system
