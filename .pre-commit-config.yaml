repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ["--verbose"]
  - repo: local
    hooks:
      - id: execute-health
        name: execute health check
        entry: bash scripts/fuzzybee-execute.sh health
        language: system
        pass_filenames: false
        always_run: true
      - id: execute-tests
        name: execute unit tests
        entry: python3 -m pytest tests/ -x --timeout=30
        language: system
        pass_filenames: false
        always_run: true
      - id: execute-secret-check
        name: execute secret leak check
        entry: python3 -c "
import sys, re
patterns = [r'shpat_', r'shpss_', r'shpca_', r'atkn_', r'sk_live_', r'AKIA', r'sk-proj-']
for line in sys.stdin:
    for p in patterns:
        if re.search(p, line):
            print(f'SECRET PATTERN FOUND: {p}')
            sys.exit(1)
"
        language: system
