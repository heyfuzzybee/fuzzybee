name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pytest
      - run: python3 -m pytest tests/ --cov=lib/ --cov-fail-under=80
      - run: bash tests/test_health.bats
      - run: bash scripts/check-secret-leaks.sh || true
      # Railway deploy: railway up --service fable5-execute
