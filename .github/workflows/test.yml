name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pytest
      - run: python3 -m pytest tests/ --cov=lib/ --cov-fail-under=64
      - run: bash tests/test_health.bats
      - run: bash scripts/self-audit.sh || true
